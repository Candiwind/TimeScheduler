<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="任务管理">
<meta name="theme-color" content="#4a90d9">
<link rel="manifest" href="manifest.json">
<title>四象限任务管理器 v4</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- Header (merged: always-visible controls + collapsible secondary) -->
  <header class="app-header">
    <h1>📊 四象限任务管理器</h1>
    <span class="header-completion" id="headerCompletion" title="今日整体完成情况">✅ <span id="hcDone">0</span>/<span id="hcTotal">0</span> · <span id="hcRate">0%</span></span>
    <div class="header-actions">
      <input type="date" id="datePicker" title="选择日期">
      <button class="btn btn-info btn-sm" id="btnToday">今天</button>
      <button class="btn btn-primary btn-sm" id="btnCacheSave">缓存当前</button>
      <button class="btn btn-info btn-sm" id="btnCacheLoad">导入缓存</button>
      <button class="btn btn-info btn-sm" id="btnShowStats">📈 统计</button>
      <button class="btn btn-sm" id="btnDailyReport" style="background:#5b9bd5;color:#fff;" title="生成日报">📋 日报</button>
      <button class="btn-icon" id="btnDarkMode" data-tooltip="切换暗色模式" title="暗色模式 (Ctrl+D)">🌙</button>
      <button class="btn btn-sm btn-cancel" id="btnToggleMore" title="展开/折叠更多功能">⚙️</button>
    </div>
  </header>

  <!-- Time Slot Stats Bar -->
  <div class="slot-stats-bar" id="slotStatsBar" style="display:none;">
    <span id="slotStatsContent"></span>
  </div>

  <!-- Collapsible secondary toolbar -->
  <div class="toolbar" id="secondaryToolbar" style="display:none;">
    <span class="toolbar-label">🔍 搜索：</span>
    <input type="text" class="search-input" id="searchInput" placeholder="搜索任务... (Ctrl+F)">
    <span class="toolbar-label" id="searchResult" style="margin-left:4px;"></span>
    <span style="flex:1;"></span>
    <button class="btn btn-success btn-sm" id="btnExportMd">📥 导出MD</button>
    <button class="btn btn-warning btn-sm" id="btnImportMd">📤 导入MD</button>
    <input type="file" id="importFileInput" accept=".md,.txt" style="display:none">
    <button class="btn btn-primary btn-sm" id="btnExportJson">📦 导出JSON</button>
    <button class="btn btn-cancel btn-sm" id="btnImportJson">📥 导入JSON</button>
    <input type="file" id="importJsonInput" accept=".json" style="display:none">
  </div>

  <!-- Hint Bar -->
  <div class="hint-bar" id="hintBar">
    💡 <strong>长期进步要重视 II 象限（重要不紧急）任务</strong> — 这是拉开差距的关键。选中任务文字后 <kbd>Ctrl+Q</kbd> 或右键可高亮重点信息。
    <button class="hint-close" title="不再显示">×</button>
  </div>

  <!-- Big Task Panel -->
  <div class="bigtask-panel collapsed" id="bigTaskPanel">
    <div class="bigtask-panel-header" id="bigTaskPanelToggle">
      <span>🎯 大任务规划 (<span id="bigTaskCount">0</span>/5，建议≤3)</span>
      <span class="bigtask-toggle-icon">▼</span>
    </div>
    <div class="bigtask-panel-body" id="bigTaskPanelBody">
      <div class="bigtask-list" id="bigTaskList">
        <div class="empty-hint" id="bigTaskEmpty">暂无大任务，点击下方按钮创建</div>
      </div>
      <!-- Today's Task Pool -->
      <div class="bigtask-pool" id="bigTaskPool" style="display:none;">
        <div class="bigtask-pool-title">📥 今日任务池（可拖入四象限）</div>
        <div class="bigtask-pool-items" id="bigTaskPoolItems"></div>
      </div>
      <div class="bigtask-actions">
        <button class="btn btn-sm btn-primary" id="btnAddBigTask">+ 新建大任务</button>
        <button class="btn btn-sm btn-info" id="btnClaudePlan" data-tooltip="用 AI 调研规划大任务">🤖 AI 规划</button>
      </div>
    </div>
  </div>

  <!-- Principles Panel -->
  <div class="principles-panel collapsed" id="principlesPanel">
    <div class="principles-panel-header" id="principlesPanelToggle">
      <span>💎 依循（<span id="principlesCount">0</span>/5，建议≤3）</span>
      <span class="principles-toggle-icon">▼</span>
    </div>
    <div class="principles-panel-body" id="principlesPanelBody">
      <div class="principles-date-row">
        <button class="btn btn-sm btn-info" id="btnSetPrinciplesDate">📅 设置日期</button>
        <span class="principles-date-display" id="principlesDateDisplay">未设置日期范围</span>
      </div>
      <div class="principles-list" id="principlesList">
        <div class="empty-hint" id="principlesEmpty">暂无原则，点击下方按钮添加</div>
      </div>
      <div class="principles-actions">
        <button class="btn btn-sm btn-primary" id="btnAddPrinciple">+ 添加原则</button>
      </div>
    </div>
  </div>

  <!-- Quadrant Grid -->
  <div class="quadrant-grid">

    <!-- Quadrant I -->
    <div class="quadrant quadrant-i" id="quadrant-I" data-key="I">
      <div class="quadrant-header">
        <span class="quadrant-icon">🔥</span>
        <span class="quadrant-title">I. 重要紧急</span>
        <span class="quadrant-label">立即处理</span>
        <span class="task-count" id="count-I">0</span>
      </div>
      <div class="quadrant-tasks"></div>
      <div class="quadrant-footer">
        <button class="btn btn-sm btn-primary btn-add-task" id="btnAddTask-I">+ 任务</button>
        <button class="btn btn-sm btn-info btn-add-block" id="btnAddBlock-I" title="添加任务块">📦</button>
      </div>
    </div>

    <!-- Quadrant II -->
    <div class="quadrant quadrant-ii" id="quadrant-II" data-key="II">
      <div class="quadrant-header">
        <span class="quadrant-icon">📋</span>
        <span class="quadrant-title">II. 重要不紧急</span>
        <span class="quadrant-label">计划安排</span>
        <span class="task-count" id="count-II">0</span>
      </div>
      <div class="quadrant-tasks"></div>
      <div class="quadrant-footer">
        <button class="btn btn-sm btn-primary btn-add-task" id="btnAddTask-II">+ 任务</button>
        <button class="btn btn-sm btn-info btn-add-block" id="btnAddBlock-II" title="添加任务块">📦</button>
      </div>
    </div>

    <!-- Quadrant III -->
    <div class="quadrant quadrant-iii" id="quadrant-III" data-key="III">
      <div class="quadrant-header">
        <span class="quadrant-icon">⚡</span>
        <span class="quadrant-title">III. 不重要紧急</span>
        <span class="quadrant-label">委派处理</span>
        <span class="task-count" id="count-III">0</span>
      </div>
      <div class="quadrant-tasks"></div>
      <div class="quadrant-footer">
        <button class="btn btn-sm btn-primary btn-add-task" id="btnAddTask-III">+ 任务</button>
        <button class="btn btn-sm btn-info btn-add-block" id="btnAddBlock-III" title="添加任务块">📦</button>
      </div>
    </div>

    <!-- Quadrant IV -->
    <div class="quadrant quadrant-iv" id="quadrant-IV" data-key="IV">
      <div class="quadrant-header">
        <span class="quadrant-icon">🌿</span>
        <span class="quadrant-title">IV. 不重要不紧急</span>
        <span class="quadrant-label">尽量减少</span>
        <span class="task-count" id="count-IV">0</span>
      </div>
      <div class="quadrant-tasks"></div>
      <div class="quadrant-footer">
        <button class="btn btn-sm btn-primary btn-add-task" id="btnAddTask-IV">+ 任务</button>
        <button class="btn btn-sm btn-info btn-add-block" id="btnAddBlock-IV" title="添加任务块">📦</button>
      </div>
    </div>

  </div><!-- /quadrant-grid -->

  <!-- Unified Plan Pool Panel (Tab: 待办/本周/本月) -->
  <div class="planpool-panel collapsed" id="planPoolPanel">
    <div class="planpool-panel-header" id="planPoolPanelToggle">
      <span>📋 计划池 (<span id="planPoolTotalCount">0</span>)</span>
      <div class="planpool-tabs" id="planPoolTabs">
        <button class="planpool-tab active" data-pool="future">待办</button>
        <button class="planpool-tab" data-pool="week">本周</button>
        <button class="planpool-tab" data-pool="month">本月</button>
      </div>
      <span class="planpool-toggle-icon">▼</span>
    </div>
    <div class="planpool-panel-body" id="planPoolPanelBody">
      <div class="planpool-list" id="planPoolList">
        <div class="empty-hint" id="planPoolEmpty">暂无计划任务，点击下方按钮添加。</div>
      </div>
      <div class="planpool-actions">
        <button class="btn btn-sm btn-primary" id="btnAddPlanTask">+ 添加任务</button>
        <button class="btn btn-sm btn-info" id="btnAddPlanBlock">+ 添加任务块</button>
      </div>
    </div>
  </div>

</div><!-- /app -->

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
  }
</script>
<script src="js/util.js"></script>
<script src="js/config.js"></script>
<script src="js/store.js"></script>
<script src="js/edit.js"></script>
<script src="js/toast.js"></script>
<script src="js/highlight.js"></script>
<script src="js/timeslot.js"></script>
<script src="js/render.js"></script>
<script src="js/drag.js"></script>
<script src="js/markdown.js"></script>
<script src="js/json-io.js"></script>
<script src="js/cache-ui.js"></script>
<script src="js/stats-ui.js"></script>
<script src="js/shortcuts.js"></script>
<script src="js/quadrant-ops.js"></script>
<script src="js/defer.js"></script>
<script src="js/future.js"></script>
<script src="js/bigtask.js"></script>
<script src="js/daily-report.js"></script>
<script src="js/app.js"></script>
</body>
</html>
